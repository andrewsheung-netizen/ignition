name: paper-report
on:
  schedule:
    - cron: '30 1 * * 1'        # Mondays 01:30 UTC (09:30 HKT) — weekly scorecard
  workflow_dispatch:           # run manually any time
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python paper_report.py
        env:
          PAPER_BOT_TOKEN: ${{ secrets.PAPER_BOT_TOKEN }}
          PAPER_CHAT_ID:   ${{ secrets.PAPER_CHAT_ID }}
