name: ignition-scan
on:
  schedule:
    - cron: '5,15,25 */4 * * *'  # :05/:15/:25 after each Binance 4h candle close (3 retries vs GitHub skips; dedup in code)
  workflow_dispatch:            # lets you run it manually from the Actions tab
    inputs:
      test_ping:
        description: 'Send a Telegram confirmation even if nothing is firing'
        type: boolean
        default: false
permissions:
  contents: write               # needed so the heartbeat step can commit
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # silences the Node 20 deprecation; keeps working after Jun 16 2026
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scan_notify.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_PING: ${{ github.event.inputs.test_ping }}

      - name: Heartbeat (keeps the schedule from auto-pausing after 60 idle days)
        if: always()            # log even if the scan step errored
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ last scan" > heartbeat.txt
          git config user.name  "ignition-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true   # get the latest dedup state before committing
          git add -A                                # commit heartbeat.txt AND scan_state.json (alert dedup)
          git diff --staged --quiet || git commit -m "heartbeat [skip ci]"
          git push || true
