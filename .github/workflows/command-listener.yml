name: command-listener
on:
  schedule:
    - cron: '*/10 * * * *'      # poll Telegram every 10 min for a "/scan" command
  workflow_dispatch:
permissions:
  contents: write               # to commit the Telegram update offset (command_state.json)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python command_listener.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Persist the command offset
        if: always()
        run: |
          git config user.name  "ignition-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          git diff --staged --quiet || git commit -m "command offset [skip ci]"
          git push || true
